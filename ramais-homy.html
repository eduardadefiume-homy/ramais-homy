<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ramais · Homy Química</title>
  <link rel="icon" type="image/webp" href="homy_icon_4k_transparent.webp">
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.28.0/lib/msal-browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand:      #1B5E8A;
      --brand-dark: #134468;
      --brand-light:#E8F3FA;
      --accent:     #2E86C1;
      --text:       #1A1A2E;
      --text-muted: #6B7280;
      --border:     #E5E7EB;
      --bg:         #F8FAFC;
      --card-bg:    #FFFFFF;
      --radius:     12px;
      --shadow:     0 2px 16px rgba(27,94,138,.10);
    }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    header {
      background: linear-gradient(135deg, var(--brand) 0%, var(--accent) 100%);
      color:#fff; padding:0 32px; height:64px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
      box-shadow:0 3px 12px rgba(27,94,138,.3);
    }
    .header-left { display:flex; align-items:center; gap:16px; }
    .logo {
      background:#fff; color:var(--brand); font-weight:900; font-size:13px;
      letter-spacing:1px; padding:5px 12px; border-radius:8px;
      text-transform:uppercase;
    }
    header h1 { font-size:17px; font-weight:600; letter-spacing:.2px; }
    .header-right { display:flex; align-items:center; gap:10px; }
    #btn-admin, #btn-manual {
      background:rgba(255,255,255,.15); border:1.5px solid rgba(255,255,255,.4);
      color:#fff; padding:7px 16px; border-radius:8px; cursor:pointer;
      font-size:13px; font-weight:500; text-decoration:none; transition:background .18s;
      display:flex; align-items:center; gap:6px;
    }
    #btn-admin:hover, #btn-manual:hover { background:rgba(255,255,255,.28); }
    #overlay-manual {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.6); z-index:300;
      align-items:center; justify-content:center; padding:20px;
    }
    #overlay-manual.open { display:flex; }
    #modal-manual {
      background:var(--card-bg); border-radius:16px;
      width:100%; max-width:900px; height:88vh;
      box-shadow:0 24px 64px rgba(0,0,0,.3);
      overflow:hidden; display:flex; flex-direction:column; animation:slideUp .2s ease;
    }
    .manual-header {
      background:linear-gradient(135deg, var(--brand) 0%, var(--accent) 100%);
      padding:16px 24px; color:#fff; display:flex; align-items:center; justify-content:space-between;
    }
    .manual-header h2 { font-size:16px; font-weight:600; }
    #manual-close {
      background:rgba(255,255,255,.15); border:none; color:#fff;
      width:32px; height:32px; border-radius:50%; cursor:pointer;
      font-size:17px; display:flex; align-items:center; justify-content:center;
    }
    #manual-close:hover { background:rgba(255,255,255,.3); }
    #manual-frame { flex:1; border:none; width:100%; }

    .toolbar { padding:24px 32px 0; display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
    #search-wrap { position:relative; flex:1; min-width:220px; max-width:400px; }
    #search-wrap svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); }
    #search {
      width:100%; padding:10px 14px 10px 40px; border:1.5px solid var(--border);
      border-radius:8px; font-size:14px; background:var(--card-bg); transition:border-color .18s;
    }
    #search:focus { outline:none; border-color:var(--brand); box-shadow:0 0 0 3px rgba(27,94,138,.12); }

    .filters { display:flex; flex-wrap:wrap; gap:8px; }
    .filter-btn {
      border:1.5px solid var(--border); background:var(--card-bg); color:var(--text-muted);
      padding:6px 14px; border-radius:20px; cursor:pointer; font-size:13px;
      font-weight:500; transition:all .18s; white-space:nowrap;
    }
    .filter-btn:hover { border-color:var(--brand); color:var(--brand); }
    .filter-btn.active { background:var(--brand); border-color:var(--brand); color:#fff; }

    .stats { padding:14px 32px 0; font-size:13px; color:var(--text-muted); }

    .dept-header {
      grid-column:1/-1; display:flex; align-items:center; gap:10px;
      padding:10px 0 2px; margin-top:8px;
    }
    .dept-header span {
      font-size:12px; font-weight:700; color:var(--text-muted);
      text-transform:uppercase; letter-spacing:.8px;
    }
    .dept-line { flex:1; height:1px; background:var(--border); }

    #grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(240px,1fr));
      gap:14px; padding:16px 32px 48px;
    }

    .card {
      background:var(--card-bg); border:1.5px solid var(--border);
      border-radius:var(--radius); padding:18px; cursor:pointer;
      transition:box-shadow .2s, border-color .2s, transform .15s;
      display:flex; flex-direction:column; gap:8px;
    }
    .card:hover { box-shadow:var(--shadow); border-color:var(--brand); transform:translateY(-2px); }
    .card-top { display:flex; align-items:center; gap:12px; }
    .card-avatar {
      width:42px; height:42px; border-radius:50%;
      background:var(--brand-light); color:var(--brand);
      font-weight:700; font-size:16px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
    }
    .card-avatar.icon { font-size:20px; background:#FFF3E0; }
    .card-info { flex:1; min-width:0; }
    .card-name { font-weight:600; font-size:14px; line-height:1.3; }
    .card-dept {
      font-size:11px; font-weight:600; color:var(--brand);
      background:var(--brand-light); padding:2px 8px; border-radius:10px;
      display:inline-block; margin-top:3px;
    }
    .card-ramal-row { display:flex; align-items:flex-end; justify-content:space-between; margin-top:4px; }
    .ramal-number { font-size:26px; font-weight:800; color:var(--text); letter-spacing:1px; line-height:1; }
    .ramal-label { font-size:10px; color:var(--text-muted); font-weight:600; letter-spacing:.5px; }
    .card-icons { display:flex; gap:6px; }
    .card-icon-badge {
      width:26px; height:26px; border-radius:6px;
      display:flex; align-items:center; justify-content:center;
      font-size:13px; background:var(--bg); border:1px solid var(--border);
    }

    #loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px; gap:16px; color:var(--text-muted); }
    .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--brand); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    #overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.5); z-index:200;
      align-items:center; justify-content:center; padding:20px;
    }
    #overlay.open { display:flex; }
    #modal {
      background:var(--card-bg); border-radius:16px;
      width:100%; max-width:460px;
      box-shadow:0 24px 64px rgba(0,0,0,.22);
      overflow:hidden; animation:slideUp .2s ease;
    }
    @keyframes slideUp { from { transform:translateY(20px); opacity:0; } }
    .modal-header {
      background:linear-gradient(135deg, var(--brand) 0%, var(--accent) 100%);
      padding:24px; color:#fff; display:flex; align-items:center; gap:16px; position:relative;
    }
    .modal-avatar {
      width:58px; height:58px; border-radius:50%;
      background:rgba(255,255,255,.2); color:#fff; font-size:22px; font-weight:700;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .modal-avatar.icon { font-size:26px; }
    .modal-header-info h2 { font-size:19px; font-weight:700; }
    .modal-header-info p { font-size:13px; opacity:.85; margin-top:2px; }
    #modal-close {
      position:absolute; top:16px; right:16px;
      background:rgba(255,255,255,.15); border:none; color:#fff;
      width:32px; height:32px; border-radius:50%; cursor:pointer;
      font-size:17px; display:flex; align-items:center; justify-content:center; transition:background .18s;
    }
    #modal-close:hover { background:rgba(255,255,255,.3); }
    .modal-body { padding:24px; display:flex; flex-direction:column; gap:12px; }
    .info-row {
      display:flex; align-items:center; gap:14px;
      padding:14px; background:var(--bg); border-radius:10px; border:1px solid var(--border);
    }
    .info-icon { width:40px; height:40px; border-radius:10px; background:var(--brand-light); color:var(--brand); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:18px; }
    .info-content label { font-size:10px; color:var(--text-muted); font-weight:700; text-transform:uppercase; letter-spacing:.6px; display:block; margin-bottom:2px; }
    .info-content span { font-size:16px; font-weight:700; color:var(--text); }
    .info-content a { font-size:15px; font-weight:600; color:var(--brand); text-decoration:none; }
    .info-content a:hover { text-decoration:underline; }

    @media(max-width:600px) {
      header { padding:0 16px; }
      .toolbar, #grid, .stats { padding-left:16px; padding-right:16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">Homy</div>
    <h1>📞 Lista de Ramais</h1>
  </div>
  <div class="header-right">
    <button id="btn-manual">📖 Manual MicroSIP</button>
    <a id="btn-admin"
       href="https://homyquimica.sharepoint.com/sites/Ramais-Homy/Lists/Ramais/AllItems.aspx"
       target="_blank">✏️ Gerenciar Ramais</a>
  </div>
</header>

<div class="toolbar">
  <div id="search-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search" type="text" placeholder="Buscar por nome, ramal ou setor…" />
  </div>
  <div class="filters" id="filters"></div>
</div>
<p class="stats" id="stats"></p>

<div id="loading"><div class="spinner"></div><span>Carregando ramais…</span></div>
<div id="grid" style="display:none"></div>

<!-- MODAL MANUAL -->
<div id="overlay-manual">
  <div id="modal-manual">
    <div class="manual-header">
      <h2>📖 Facilidades no uso do MicroSIP</h2>
      <button id="manual-close">✕</button>
    </div>
    <iframe id="manual-frame"
      src="https://view.officeapps.live.com/op/embed.aspx?src=https://eduardadefiume-homy.github.io/ramais-homy/Facilidades%20no%20uso%20do%20MicroSIP.docx">
    </iframe>
  </div>
</div>

<!-- MODAL -->
<div id="overlay">
  <div id="modal">
    <div class="modal-header">
      <div class="modal-avatar" id="m-avatar"></div>
      <div class="modal-header-info"><h2 id="m-nome"></h2><p id="m-dept"></p></div>
      <button id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="info-row">
        <div class="info-icon">📞</div>
        <div class="info-content"><label>Ramal</label><span id="m-ramal"></span></div>
      </div>
      <div class="info-row" id="row-email" style="display:none">
        <div class="info-icon">✉️</div>
        <div class="info-content"><label>E-mail</label><a id="m-email" href="#"></a></div>
      </div>
      <div class="info-row" id="row-celular" style="display:none">
        <div class="info-icon">📱</div>
        <div class="info-content"><label>Celular / WhatsApp</label><a id="m-celular" href="#" target="_blank"></a></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIGURAÇÃO — altere apenas estes valores se necessário
// ============================================================
const CLIENT_ID  = "2e73e8be-484b-428e-a6c0-c75b1bf70d8a";
const TENANT_ID  = "a2850abc-334a-4805-b6b2-420b4aef68a9";
const SITE_NAME  = "Ramais-Homy";
const LIST_NAME  = "Ramais";
// ============================================================

const msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: `https://login.microsoftonline.com/${TENANT_ID}`,
    redirectUri: window.location.href.split("?")[0]
  },
  cache: { cacheLocation: "sessionStorage" }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);
const scopes = ["Sites.Read.All", "User.Read"];

const SETOR_ICONS = {
  "Geral":"🏢","Recepção":"🎯","Diretoria":"👔","TI":"💻","Comercial":"💼",
  "RH":"👥","Financeiro":"💰","Fiscal":"📋","Contabilidade":"📒","Contábil JLB":"📒",
  "Laboratório":"🔬","SGI":"📊","Homy Tec":"⚙️","Marketing":"📣","PCP":"📦",
  "Suprimentos":"🛒","Logística":"🚚","Manutenção":"🔧","Produção":"🏭",
  "Almoxarifado":"📦","Faturamento":"🧾","Custos":"💹","Controladoria":"📈",
  "Contratos":"📝","Recebimento":"📥","Adm Geral":"🗂️"
};

let allData = [], currentDept = "Todos";

async function getToken() {
  await msalInstance.initialize();

  // Trata redirect de volta do login
  await msalInstance.handleRedirectPromise();

  const accounts = msalInstance.getAllAccounts();
  if (accounts.length === 0) {
    // Nenhuma sessão — faz login silencioso via redirect
    msalInstance.loginRedirect({ scopes });
    return null;
  }

  try {
    const result = await msalInstance.acquireTokenSilent({ scopes, account: accounts[0] });
    return result.accessToken;
  } catch {
    msalInstance.loginRedirect({ scopes });
    return null;
  }
}

async function fetchRamais(token) {
  // 1. Descobre o ID do site
  const siteRes = await fetch(
    `https://graph.microsoft.com/v1.0/sites/homyquimica.sharepoint.com:/sites/${SITE_NAME}`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (!siteRes.ok) throw new Error("Erro ao buscar site: " + siteRes.status);
  const site = await siteRes.json();

  // 2. Busca itens da lista
  const listRes = await fetch(
    `https://graph.microsoft.com/v1.0/sites/${site.id}/lists/${LIST_NAME}/items?expand=fields($select=Title,Ramal,Departamento,Email,Celular,E_x002d_mail)&$top=500`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (!listRes.ok) throw new Error("Erro ao buscar lista: " + listRes.status);
  const data = await listRes.json();

  return data.value.map(i => ({
    Nome:         i.fields.Title        || "",
    Ramal:        i.fields.Ramal        || "",
    Departamento: i.fields.Departamento || "Geral",
    Email:        i.fields["E_x002d_mail"] || i.fields.Email || "",
    Celular:      i.fields.Celular      || ""
  }));
}

document.addEventListener("DOMContentLoaded", async () => {
  document.getElementById("search").addEventListener("input", renderAll);
  document.getElementById("modal-close").addEventListener("click", closeModal);
  document.getElementById("btn-manual").addEventListener("click", () => document.getElementById("overlay-manual").classList.add("open"));
  document.getElementById("manual-close").addEventListener("click", () => document.getElementById("overlay-manual").classList.remove("open"));
  document.getElementById("overlay-manual").addEventListener("click", e => { if(e.target===document.getElementById("overlay-manual")) document.getElementById("overlay-manual").classList.remove("open"); });
  document.getElementById("overlay").addEventListener("click", e => {
    if (e.target === document.getElementById("overlay")) closeModal();
  });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  try {
    const token = await getToken();
    if (!token) return; // redirecionando para login

    const dados = await fetchRamais(token);
    if (dados.length > 0) {
      allData = dados;
      renderAll();
    } else {
      document.getElementById("loading").innerHTML = "<span>Nenhum ramal encontrado na lista.</span>";
    }
  } catch (err) {
    console.error(err);
    document.getElementById("loading").innerHTML = `<span>❌ Erro ao carregar ramais: ${err.message}</span>`;
  }
});

function renderAll() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  const grid = document.getElementById("grid");
  const depts = ["Todos", ...new Set(allData.map(d => d.Departamento).sort())];
  renderFilters(depts);
  const filtered = allData.filter(d => {
    const mD = currentDept === "Todos" || d.Departamento === currentDept;
    const mQ = !q || d.Nome.toLowerCase().includes(q) || d.Ramal.includes(q) || d.Departamento.toLowerCase().includes(q);
    return mD && mQ;
  });
  const groups = {};
  filtered.forEach(d => { if (!groups[d.Departamento]) groups[d.Departamento] = []; groups[d.Departamento].push(d); });
  grid.innerHTML = "";
  if (filtered.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#6B7280"><div style="font-size:48px;margin-bottom:12px">🔍</div><p>Nenhum resultado para "<strong>${q}</strong>"</p></div>`;
  } else {
    Object.keys(groups).sort().forEach(dept => {
      const sep = document.createElement("div"); sep.className = "dept-header";
      sep.innerHTML = `<div class="dept-line"></div><span>${dept}</span><div class="dept-line"></div>`;
      grid.appendChild(sep);
      groups[dept].forEach(d => grid.appendChild(createCard(d)));
    });
  }
  document.getElementById("stats").textContent = filtered.length === allData.length
    ? `${allData.length} ramais cadastrados`
    : `${filtered.length} de ${allData.length} ramais`;
  document.getElementById("loading").style.display = "none";
  grid.style.display = "grid";
}

function renderFilters(depts) {
  const c = document.getElementById("filters"); c.innerHTML = "";
  depts.forEach(dept => {
    const b = document.createElement("button");
    b.className = "filter-btn" + (dept === currentDept ? " active" : "");
    b.textContent = dept;
    b.addEventListener("click", () => { currentDept = dept; renderAll(); });
    c.appendChild(b);
  });
}

function getInitials(n) { return n.split(" ").filter(Boolean).slice(0, 2).map(w => w[0]).join("").toUpperCase(); }

function createCard(d) {
  const card = document.createElement("div"); card.className = "card";
  const icon = SETOR_ICONS[d.Departamento] || "📞";
  const hasContact = d.Email || d.Celular;
  card.innerHTML = `
    <div class="card-top">
      <div class="card-avatar">${getInitials(d.Nome) || icon}</div>
      <div class="card-info"><div class="card-name">${d.Nome}</div><div class="card-dept">${d.Departamento}</div></div>
    </div>
    <div class="card-ramal-row">
      <div><div class="ramal-number">${d.Ramal}</div><div class="ramal-label">RAMAL</div></div>
      <div class="card-icons">
        ${d.Email  ? `<div class="card-icon-badge" title="${d.Email}">✉️</div>` : ""}
        ${d.Celular? `<div class="card-icon-badge" title="${d.Celular}">📱</div>` : ""}
      </div>
    </div>`;
  if (hasContact) card.addEventListener("click", () => openModal(d));
  return card;
}

function openModal(d) {
  const icon = SETOR_ICONS[d.Departamento] || "📞";
  const av = document.getElementById("m-avatar");
  av.textContent = getInitials(d.Nome) || icon;
  av.className = "modal-avatar";
  document.getElementById("m-nome").textContent = d.Nome;
  document.getElementById("m-dept").textContent = d.Departamento;
  document.getElementById("m-ramal").textContent = d.Ramal;
  const rowE = document.getElementById("row-email"), rowC = document.getElementById("row-celular");
  const elE  = document.getElementById("m-email"),   elC  = document.getElementById("m-celular");
  if (d.Email)   { elE.textContent = d.Email;   elE.href = `mailto:${d.Email}`;                          rowE.style.display = "flex"; } else rowE.style.display = "none";
  if (d.Celular) { const n = d.Celular.replace(/\D/g,""); elC.textContent = d.Celular; elC.href = `https://wa.me/55${n}`; rowC.style.display = "flex"; } else rowC.style.display = "none";
  document.getElementById("overlay").classList.add("open");
}

function closeModal() { document.getElementById("overlay").classList.remove("open"); }
</script>
</body>
</html>
